<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Ti amo</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #ff4e8a, #ff9a9e);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: 'Arial', sans-serif;
        text-align: center;
        color: white;
    }

    .message {
        z-index: 2;
        font-size: 2rem;
        padding: 20px;
        max-width: 800px;
        line-height: 1.5;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    .heart {
        position: absolute;
        color: rgba(255, 255, 255, 0.8);
        font-size: 24px;
        animation: float 6s linear infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.5);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<div class="message">
    Tu sei la mia vita, altro io non ho.<br>
    Tu sei la mia strada, la mia verità.<br><br>
    <strong>Ti amo amore mio</strong>,<br>
    sei <strong>todo para mi</strong> ❤️
</div>

<script>
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 30 + 20 + "px";
        heart.style.animationDuration = Math.random() * 3 + 4 + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 7000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
