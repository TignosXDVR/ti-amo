<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per Te ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;
}

#messaggio{
display:none;
}

h1{
font-size:36px;
max-width:800px;
padding:20px;
text-shadow:2px 2px 10px rgba(0,0,0,0.3);
}

button{
padding:20px 40px;
font-size:26px;
border:none;
border-radius:40px;
background:white;
color:#ff4d6d;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.gifs{
margin-top:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.gifs img{
width:180px;
margin:10px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<button onclick="mostraAmore()">Cliccami ❤️</button>

<div id="messaggio">

<h1>
Ti chiedo scusa amore mio 💌 <br><br>
Spero che questa cosa ti faccia sorridere ❤️
</h1>

<div class="gifs">

<img src="https://media.giphy.com/media/l2QDM9Jnim1YVILXa/giphy.gif">

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<img src="https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif">

</div>

</div>

<script>

function mostraAmore(){

document.querySelector("button").style.display="none";
document.getElementById("messaggio").style.display="block";

setInterval(creaCuore,300);

}

function creaCuore(){

const cuore=document.createElement("div");

cuore.classList.add("heart");

cuore.innerHTML="❤️";

cuore.style.left=Math.random()*100+"vw";

cuore.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(cuore);

setTimeout(()=>{
cuore.remove();
},6000);

}

</script>

</body>
</html>
